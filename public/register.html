<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Registro - FTP MCP Server Open</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container fade-in">
    <a href="/" class="back-to-home">&#8592; Volver al inicio</a>
    <div class="auth-logo">&#128268;</div>
    <div class="auth-card">
      <h2>Crear Cuenta</h2>
      <p class="subtitle">Registrate para gestionar tus servidores FTP con IA compatible MCP</p>

      <div id="alert" class="alert alert-error"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Nombre (opcional)</label>
          <input type="text" id="name" placeholder="Tu nombre">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contrasena</label>
          <input type="password" id="password" placeholder="Minimo 8 caracteres" required minlength="8" oninput="updateStrength()">
          <div class="password-strength"><div id="strengthBar" class="strength-bar"></div></div>
          <div id="strengthText" class="strength-text text-muted"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Contrasena</label>
          <input type="password" id="confirmPassword" placeholder="Repite tu contrasena" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">Crear Cuenta</button>
      </form>

      <div class="auth-link">
        Ya tienes cuenta? <a href="/login">Inicia sesion</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function updateStrength() {
      const pw = document.getElementById('password').value;
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      bar.className = 'strength-bar';
      if (score <= 1) { bar.classList.add('weak'); text.textContent = 'Debil'; text.style.color = 'var(--danger)'; }
      else if (score <= 3) { bar.classList.add('medium'); text.textContent = 'Media'; text.style.color = 'var(--warning)'; }
      else { bar.classList.add('strong'); text.textContent = 'Fuerte'; text.style.color = 'var(--success)'; }
      if (!pw) { text.textContent = ''; bar.className = 'strength-bar'; }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        alertEl.textContent = 'Las contrasenas no coinciden';
        alertEl.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creando cuenta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            name: document.getElementById('name').value || undefined,
            email: document.getElementById('email').value,
            password,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          alertEl.textContent = data.error || 'Error al crear cuenta';
          alertEl.style.display = 'block';
          return;
        }

        window.location.href = '/dashboard';
      } catch (err) {
        alertEl.textContent = 'Error de conexion. Intenta de nuevo.';
        alertEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear Cuenta';
      }
    });

    // Si ya tiene sesion, redirigir
    fetch('/api/auth/me', { credentials: 'include' })
      .then(r => { if (r.ok) window.location.href = '/dashboard'; })
      .catch(() => {});
  </script>
</body>
</html>
